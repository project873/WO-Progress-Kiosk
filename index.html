<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midwest Mfg.</title>

    <!-- CDN dependencies loaded before the app module -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2563eb', weld: '#ef4444', fab: '#f59e0b',
                        assy: '#10b981', office: '#8b5cf6'
                    }
                }
            }
        };
    </script>

    <!-- ── Light theme ─────────────────────────────────────────────────────── -->
    <style>
        /* Page background */
        body { background-color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; }

        /* Slate backgrounds → light equivalents */
        .bg-slate-950 { background-color: #f8fafc !important; }
        .bg-slate-900 { background-color: #f8fafc !important; }
        .bg-slate-800 { background-color: #ffffff !important; }
        .bg-slate-700 { background-color: #f1f5f9 !important; }
        .bg-slate-600 { background-color: #e2e8f0 !important; }
        .bg-slate-500 { background-color: #cbd5e1 !important; }

        /* Alpha/opacity variants */
        .bg-slate-700\/80 { background-color: rgba(241,245,249,0.95) !important; }
        .bg-slate-700\/60 { background-color: rgba(241,245,249,0.85) !important; }
        .bg-slate-700\/50 { background-color: rgba(241,245,249,0.85) !important; }
        .bg-slate-700\/40 { background-color: rgba(248,250,252,0.9)  !important; }

        /* Modal overlays stay dark */
        .bg-black\/80 { background-color: rgba(0,0,0,0.70) !important; }

        /* Structural text: white/light → dark */
        .text-white   { color: #0f172a !important; }
        .text-slate-100, .text-slate-200 { color: #1e293b !important; }
        .text-slate-300 { color: #475569 !important; }
        .text-slate-400 { color: #64748b !important; }
        .text-slate-500 { color: #94a3b8 !important; }
        .text-slate-600 { color: #64748b !important; }

        /* Restore white text on colored buttons/badges (chained selector = same element has both classes) */
        .bg-blue-600.text-white,    .bg-blue-500.text-white,
        .bg-teal-600.text-white,    .bg-teal-500.text-white,
        .bg-emerald-600.text-white, .bg-emerald-500.text-white,
        .bg-violet-600.text-white,  .bg-violet-700.text-white, .bg-violet-500.text-white,
        .bg-red-600.text-white,     .bg-red-500.text-white,
        .bg-indigo-600.text-white,
        .bg-green-600.text-white,
        .bg-amber-600.text-white    { color: #ffffff !important; }

        /* Amber buttons use dark text — keep it */
        .bg-amber-500.text-slate-900 { color: #0f172a !important; }

        /* Borders */
        .border-slate-700  { border-color: #e2e8f0 !important; }
        .border-slate-600  { border-color: #cbd5e1 !important; }
        .border-slate-700\/40 { border-color: rgba(226,232,240,0.7) !important; }
        .border-slate-600\/50 { border-color: rgba(203,213,225,0.7) !important; }

        /* Hover */
        .hover\:bg-slate-700:hover { background-color: #e2e8f0 !important; }
        .hover\:bg-slate-600:hover { background-color: #cbd5e1 !important; }
        .hover\:bg-slate-500:hover { background-color: #e2e8f0 !important; }
        .hover\:text-white:hover   { color: #0f172a !important; }

        /* Input/textarea text */
        input, textarea, select { color: #1e293b !important; }
        input::placeholder, textarea::placeholder { color: #94a3b8 !important; }

        /* Softer shadows on light background */
        .shadow-2xl { box-shadow: 0 20px 40px -8px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.04) !important; }
        .shadow-xl  { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.08) !important; }
    </style>

    <!-- Global error handler: catches script load failures BEFORE Vue mounts -->
    <script>
        window.onerror = function(msg, src, line, col, err) {
            var el = document.getElementById('app-loading');
            if (el) {
                el.innerHTML =
                    '<div style="text-align:center;padding:2rem;">' +
                    '<h2 style="font-size:2rem;font-weight:bold;color:#ef4444;margin-bottom:1rem;">Something went wrong</h2>' +
                    '<p style="color:#94a3b8;margin-bottom:0.5rem;">' + msg + '</p>' +
                    '<p style="color:#64748b;font-size:0.875rem;margin-bottom:1.5rem;">Line ' + line + '</p>' +
                    '<button onclick="location.reload()" style="background:#2563eb;color:white;padding:0.75rem 2rem;border-radius:0.5rem;font-weight:bold;border:none;cursor:pointer;font-size:1.125rem;">Reload Page</button>' +
                    '</div>';
            }
        };
    </script>

    <style>
        [v-cloak] { display: none; }
    </style>

    <style>
        /* ── Print: WO Traveler Summary ──────────────────────────── */
        .wo-print-summary { display: none; }

        @media print {
            /* visibility:hidden on everything — unlike display:none, descendants
               can override this with visibility:visible */
            body * { visibility: hidden !important; }

            /* Reveal the summary and all its children */
            .wo-print-summary,
            .wo-print-summary * { visibility: visible !important; }

            /* Anchor to top of page regardless of DOM nesting depth */
            .wo-print-summary {
                position: absolute !important;
                top: 0 !important; left: 0 !important;
                width: 100% !important;
                background: white !important;
                display: block !important;
            }

            /* Remove screen constraints */
            body { overflow: visible !important; height: auto !important;
                   background: white !important; color: black !important;
                   font-family: system-ui, sans-serif; font-size: 11pt; }

            /* Page margins */
            @page { margin: 1.5cm; }

            /* Summary typography */
            .wo-print-summary h1  { font-size: 16pt; font-weight: bold; margin: 0 0 4pt; }
            .wo-print-summary h2  { font-size: 11pt; font-weight: bold; margin: 14pt 0 4pt;
                                    border-bottom: 1pt solid #000; padding-bottom: 2pt; }
            .wo-print-summary hr  { border: none; border-top: 1pt solid #000; margin: 8pt 0; }
            .wo-print-summary table { width: 100%; border-collapse: collapse; margin: 6pt 0; }
            .wo-print-summary th  { text-align: left; font-size: 8pt; font-weight: bold;
                                    text-transform: uppercase; color: #555; padding-bottom: 2pt; }
            .wo-print-summary td  { font-size: 11pt; font-weight: bold; padding: 2pt 0; }
            .wo-print-summary pre { font-size: 8.5pt; white-space: pre-wrap; font-family: monospace;
                                    line-height: 1.4; margin: 0; }
            .wo-print-summary footer { margin-top: 16pt; font-size: 8pt; color: #888; }
        }
    </style>
</head>

<body class="bg-slate-900 text-white select-none overflow-hidden h-screen w-screen font-sans">

    <!-- Loading fallback: visible before Vue mounts, removed by main.js onMounted() -->
    <!-- If Vue fails, this stays visible and shows the error via window.onerror or main.js catch -->
    <div id="app-loading" class="h-full w-full flex items-center justify-center absolute inset-0 z-50 bg-slate-900">
        <div class="text-center">
            <h2 class="text-4xl font-bold text-white mb-4">Midwest Mfg.</h2>
            <p class="text-slate-400 text-lg">Loading&hellip;</p>
        </div>
    </div>

    <!-- Vue App Root — populated by loadPartials() in main.js before Vue mounts -->
    <div id="app" class="h-full w-full flex flex-col" v-cloak></div>

    <!-- Load app as ES6 module (after CDN scripts above) -->
    <script type="module" src="main.js"></script>

</body>
</html>
