                                                            <span v-else

                                                                  class="flex-1 min-w-0 truncate cursor-text hover:bg-black/[0.04] rounded px-0.5 -mx-0.5"

                                                                {{ order.ship_quote_2 || '—' }}

                                                        </div>
                                                        <div class="flex items-center gap-1">
                                                            <span class="text-slate-400 shrink-0 text-xs w-9">Cost</span>
                                                            <input v-if="openOrderEditingCell.id===order.id && openOrderEditingCell.field==='ship_cost_3'"
                                                                   v-model="openOrderEditingValue"
                                                                   :ref="el=>{if(el)el.focus()}"
                                                                   @blur="saveCellEdit(order.id,'ship_cost_3')"
                                                                   @keydown.enter.prevent="saveCellEdit(order.id,'ship_cost_3')"
                                                                   @keydown.escape.prevent="cancelCellEdit()"
                                                                   @click.stop @mousedown.stop
                                                                   class="flex-1 min-w-0 border border-indigo-400 rounded px-1 text-sm focus:outline-none" />
                                                            <span v-else
                                                                  @click.stop="startCellEdit(order.id,'ship_cost_3',order.ship_cost_3)"
                                                                  @mousedown.stop
                                                                  class="flex-1 min-w-0 truncate cursor-text hover:bg-black/[0.04] rounded px-0.5 -mx-0.5"
                                                                  :class="order.ship_cost_3 ? 'text-slate-700' : 'text-slate-300 italic'">
                                                                {{ order.ship_cost_3 || '—' }}
                                                            </span>
                                                        </div>
                                                    </template>
                                                    <!-- Paid (always) -->
                                                    <div class="flex items-center gap-1">
                                                        <span class="text-xs w-9 shrink-0" :class="order.ship_paid_4 ? 'text-green-600 font-semibold' : 'text-slate-400'">Paid</span>
                                                        <input v-if="openOrderEditingCell.id===order.id && openOrderEditingCell.field==='ship_paid_4'"
                                                               v-model="openOrderEditingValue"
                                                               :ref="el=>{if(el)el.focus()}"
                                                               @blur="saveCellEdit(order.id,'ship_paid_4')"
                                                               @keydown.enter.prevent="saveCellEdit(order.id,'ship_paid_4')"
                                                               @keydown.escape.prevent="cancelCellEdit()"
                                                               @click.stop @mousedown.stop
                                                               class="flex-1 min-w-0 border border-indigo-400 rounded px-1 text-sm focus:outline-none" />
                                                        <span v-else
                                                              @click.stop="startCellEdit(order.id,'ship_paid_4',order.ship_paid_4)"
                                                              @mousedown.stop
                                                              class="flex-1 min-w-0 truncate cursor-text hover:bg-black/[0.04] rounded px-0.5 -mx-0.5"
                                                              :class="order.ship_paid_4 ? 'text-green-700 font-bold' : 'text-slate-300 italic'">
                                                            {{ order.ship_paid_4 || '—' }}
                                                        </span>
                                                    </div>
                                                </div>

                                                <!-- Col 9: Boxes — B1 always; B2–B4 expandable -->
                                                <div class="flex flex-col gap-1 text-sm min-w-0" @click.stop @mousedown.stop>
                                                    <!-- B1 (always) -->
                                                    <div class="flex items-center gap-1">
                                                        <span class="text-slate-400 shrink-0 text-xs w-6">B1</span>
                                                        <input v-if="openOrderEditingCell.id===order.id && openOrderEditingCell.field==='box1'"
                                                               v-model="openOrderEditingValue"
                                                               :ref="el=>{if(el)el.focus()}"
                                                               @blur="saveCellEdit(order.id,'box1')"
                                                               @keydown.enter.prevent="saveCellEdit(order.id,'box1')"
                                                               @keydown.escape.prevent="cancelCellEdit()"
                                                               @click.stop @mousedown.stop
                                                               class="flex-1 min-w-0 border border-indigo-400 rounded px-1 text-sm focus:outline-none" />
                                                        <span v-else
                                                              @click.stop="startCellEdit(order.id,'box1',order.box1)"
                                                              @mousedown.stop
                                                              class="flex-1 min-w-0 truncate cursor-text hover:bg-black/[0.04] rounded px-0.5 -mx-0.5"
                                                              :class="order.box1 ? 'text-slate-700' : 'text-slate-300 italic'">
                                                            {{ order.box1 || '—' }}
                                                        </span>
                                                    </div>
                                                    <!-- B2–B4 (expandable) -->
                                                    <template v-if="openOrderExpandedCols[order.id]?.boxes">
                                                        <div v-for="(displayLabel, dbField) in {box2:'B2',box3:'B3',box4:'B4'}" :key="dbField" class="flex items-center gap-1">
                                                            <span class="text-slate-400 shrink-0 text-xs w-6">{{ displayLabel }}</span>
                                                            <input v-if="openOrderEditingCell.id===order.id && openOrderEditingCell.field===dbField"
                                                                   v-model="openOrderEditingValue"
                                                                   :ref="el=>{if(el)el.focus()}"
                                                                   @blur="saveCellEdit(order.id, dbField)"
                                                                   @keydown.enter.prevent="saveCellEdit(order.id, dbField)"
                                                                   @keydown.escape.prevent="cancelCellEdit()"
                                                                   @click.stop @mousedown.stop
                                                                   class="flex-1 min-w-0 border border-indigo-400 rounded px-1 text-sm focus:outline-none" />
                                                            <span v-else
                                                                  @click.stop="startCellEdit(order.id, dbField, order[dbField])"
                                                                  @mousedown.stop
                                                                  class="flex-1 min-w-0 truncate cursor-text hover:bg-black/[0.04] rounded px-0.5 -mx-0.5"
                                                                  :class="order[dbField] ? 'text-slate-700' : 'text-slate-300 italic'">
                                                                {{ order[dbField] || '—' }}
                                                            </span>
                                                        </div>
                                                    </template>
                                                    <!-- Expand / collapse toggle -->
                                                    <button @click.stop="toggleOpenOrderExpand(order.id,'boxes')" @mousedown.stop
                                                            class="text-indigo-400 hover:text-indigo-600 text-xs self-start leading-none mt-0.5 transition-colors">
                                                        {{ openOrderExpandedCols[order.id]?.boxes ? '− less' : '+ B2–B4' }}
                                                    </button>
                                                </div>

                                                <!-- Col 10: Notes -->
                                                <div class="min-w-0 text-sm" @click.stop="startCellEdit(order.id,'wo_va_notes',order.wo_va_notes)" @mousedown.stop>

                                                           v-model="openOrderEditingValue"
                                                           :ref="el=>{if(el)el.focus()}"
                                                           @blur="saveCellEdit(order.id,'wo_va_notes')"
                                                           @keydown.enter.prevent="saveCellEdit(order.id,'wo_va_notes')"
                                                           @keydown.escape.prevent="cancelCellEdit()"
                                                           @click.stop @mousedown.stop
                                                           class="w-full border border-indigo-400 rounded px-1 text-sm focus:outline-none" />
                                                    <span v-else
                                                          class="cursor-text hover:bg-black/[0.04] rounded px-0.5 -mx-0.5 block leading-snug"
                                                          :class="order.wo_va_notes ? 'text-slate-700' : 'text-slate-300 italic'">
                                                        {{ order.wo_va_notes || 'add note…' }}
                                                    </span>
                                                </div>

                                                <!-- Col 11: Customer -->
                                                <div class="min-w-0 text-sm" @click.stop="startCellEdit(order.id,'customer',order.customer)" @mousedown.stop>
                                                    <input v-if="openOrderEditingCell.id===order.id && openOrderEditingCell.field==='customer'"
                                                           v-model="openOrderEditingValue"
                                                           :ref="el=>{if(el)el.focus()}"
                                                           @blur="saveCellEdit(order.id,'customer')"
                                                           @keydown.enter.prevent="saveCellEdit(order.id,'customer')"
                                                           @keydown.escape.prevent="cancelCellEdit()"
                                                           @click.stop @mousedown.stop
                                                           class="w-full border border-indigo-400 rounded px-1 text-sm focus:outline-none" />
                                                    <span v-else
                                                          class="break-words line-clamp-2 leading-snug cursor-text hover:bg-black/[0.04] rounded px-0.5 -mx-0.5"
                                                          :class="order.customer ? 'text-slate-700' : 'text-slate-300 italic'">
                                                        {{ order.customer || '—' }}
                                                    </span>
                                                </div>

                                                <!-- Col 12: Sales Order -->
                                                <div class="min-w-0 text-sm" @click.stop="startCellEdit(order.id,'sales_order',order.sales_order)" @mousedown.stop>
                                                    <input v-if="openOrderEditingCell.id===order.id && openOrderEditingCell.field==='sales_order'"
                                                           v-model="openOrderEditingValue"
                                                           :ref="el=>{if(el)el.focus()}"
                                                           @blur="saveCellEdit(order.id,'sales_order')"
                                                           @keydown.enter.prevent="saveCellEdit(order.id,'sales_order')"
                                                           @keydown.escape.prevent="cancelCellEdit()"
                                                           @click.stop @mousedown.stop
                                                           class="w-full border border-indigo-400 rounded px-1 text-sm focus:outline-none" />
                                                    <span v-else
                                                          class="truncate block cursor-text hover:bg-black/[0.04] rounded px-0.5 -mx-0.5"
                                                          :class="order.sales_order ? 'text-slate-700' : 'text-slate-300 italic'">
                                                        {{ order.sales_order || '—' }}
                                                    </span>
                                                </div>

                                                <div class="min-w-0 text-sm" @click.stop="startCellEdit(order.id,'wo_po_number',order.wo_po_number)" @mousedown.stop>

                                                           @blur="saveCellEdit(order.id,'wo_po_number')"
                                                           @keydown.enter.prevent="saveCellEdit(order.id,'wo_po_number')"
                                                           @keydown.escape.prevent="cancelCellEdit()"
                                                           @click.stop @mousedown.stop
                                                           class="w-full border border-indigo-400 rounded px-1 text-sm focus:outline-none" />

                                                        {{ order.wo_po_number || '—' }}
                                                    </span>

                                                <div class="min-w-0 text-sm" @click.stop="startCellEdit(order.id,'date_entered',order.date_entered)" @mousedown.stop>
                                                    <input v-if="openOrderEditingCell.id===order.id && openOrderEditingCell.field==='date_entered'"
                                                           v-model="openOrderEditingValue" type="date"
                                                           :ref="el=>{if(el)el.focus()}"

                                                           @keydown.enter.prevent="saveCellEdit(order.id,'date_entered')"
                                                           @keydown.escape.prevent="cancelCellEdit()"

                                                    <input v-if="openOrderEditingCell.id===order.id && openOrderEditingCell.field==='deadline'"
                                                           v-model="openOrderEditingValue" type="date"
                                                           :ref="el=>{if(el)el.focus()}"
                                                           @blur="saveCellEdit(order.id,'deadline')"
                                                           @keydown.enter.prevent="saveCellEdit(order.id,'deadline')"
                                                           @keydown.escape.prevent="cancelCellEdit()"
                                                           @click.stop @mousedown.stop
                                                           class="w-full border border-indigo-400 rounded px-1 text-sm focus:outline-none text-slate-700" />
                                                    <span v-else class="cursor-text hover:bg-black/[0.04] rounded px-0.5 -mx-0.5">{{ order.deadline || '—' }}</span>
                                                </div>

                                                <!-- Col 16: Last Status Update -->
                                                <div class="min-w-0 text-xs text-slate-500 tabular-nums" @click.stop @mousedown.stop>
                                                    {{ order.last_status_update ? order.last_status_update.slice(0,10) : '—' }}
                                                </div>

                                                <!-- Col 17: Status -->
                                                <div class="min-w-0" @click.stop="startCellEdit(order.id,'status',order.status)" @mousedown.stop>

                                                            :ref="el=>{if(el)el.focus()}"
                                                            @change="saveCellEdit(order.id,'status')"
                                                            @blur="saveCellEdit(order.id,'status')"
                                                            @keydown.escape.prevent="cancelCellEdit()"
                                                            @click.stop @mousedown.stop
                                                            class="w-full border border-indigo-400 rounded px-1 py-0.5 text-xs focus:outline-none">
                                                        <option v-for="s in openOrderStatuses" :key="s" :value="s">{{ s }}</option>
                                                    </select>
                                                    <span v-else
                                                          :class="openOrderStatusClass(order.status)"
                                                          class="inline-block px-1.5 py-0.5 rounded text-xs font-semibold whitespace-nowrap cursor-pointer">
                                                        {{ order.status || 'New/Picking' }}
                                                    </span>
                                                </div>

                                                <!-- Col 18: Delete -->
                                                <div class="flex items-start justify-center pt-0.5" @click.stop @mousedown.stop>
                                                    <button @click="deleteOpenOrder(order.id, order.part_number)"

                                                            class="text-slate-300 hover:text-red-500 transition-colors">

                                                        </svg>
                                                    </button>
                                                </div>

                                            <!-- Line 2: Last status update (only shown when populated) -->

                                            </div>

                                            <!-- Line 3: Weight, chute, bracket, holding bin, override (conditional) -->
                                            <div v-if="openOrderHasLine3(order)"
                                                 class="flex items-center flex-wrap gap-x-4 gap-y-0 px-2 pb-1.5 text-xs ml-10 text-slate-500 bg-black/[0.02]">
                                                <span v-if="order.weight_lbs"><span class="text-slate-400">Wt:</span> {{ order.weight_lbs }} lbs</span>
                                                <span v-if="order.chute_status"><span class="text-slate-400">Chute:</span> {{ order.chute_status }}<span v-if="order.chute_date" class="text-slate-400 ml-0.5">{{ order.chute_date }}</span></span>
                                                <span v-if="order.bracket_adapter_status"><span class="text-slate-400">Bracket:</span> {{ order.bracket_adapter_status }}<span v-if="order.bracket_adapter_date" class="text-slate-400 ml-0.5">{{ order.bracket_adapter_date }}</span></span>
                                                <span v-if="order.holding_bin_chute || order.holding_bin_status || order.holding_bin_part">
                                                    <span class="text-slate-400">Holding Bin:</span>
                                                    {{ [order.holding_bin_chute, order.holding_bin_status, order.holding_bin_part, order.holding_bin_date].filter(Boolean).join(' · ') }}
                                                </span>
                                                <span v-if="order.override"><span class="text-amber-600 font-semibold">Override:</span> <span class="text-amber-700">{{ order.override }}</span></span>
                                            </div>

                                        </div><!-- end order row -->

                                        <!-- Drop zone: after this row -->
                                        <div class="mx-2 rounded transition-all"
                                             :class="openOrderDropZoneTarget === section.type+':'+(idx+1) ? 'h-1.5 bg-indigo-400 my-0.5' : 'h-0'"
                                             @dragover="onDropZoneDragOver($event, section.type, idx+1)"
                                             @dragleave="clearDropZone()"
                                             @drop="reorderDrop($event, section.type, idx+1)">
                                        </div>

                                    </template><!-- end row + drop zone template -->

                                </div><!-- end rows container -->

                            </div><!-- end horizontal scroll container -->

                        </div><!-- end section card -->
                    </template><!-- end sections v-for -->

                </div><!-- end scrollable content -->

                <!-- ── Selection indicator pill ───────────────── -->
                <div v-if="openOrderSelectedIds.length > 0"
                     class="absolute bottom-5 left-1/2 -translate-x-1/2 z-40 bg-indigo-700 text-white px-5 py-2.5 rounded-full shadow-2xl text-sm font-semibold flex items-center gap-3 pointer-events-auto">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                    {{ openOrderSelectedIds.length }} row{{ openOrderSelectedIds.length > 1 ? 's' : '' }} selected — drag to a section header to move
                    <button @click="clearRowSelection()"
                        class="text-white/60 hover:text-white transition-colors ml-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div><!-- end open orders view -->
