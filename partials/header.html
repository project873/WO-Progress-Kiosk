        <!-- ══ HEADER ══════════════════════════════════════════ -->
        <header v-if="currentView !== 'login'" class="bg-slate-800 border-b border-slate-700 py-4 px-6 flex justify-between items-center shadow-md z-10 shrink-0">
            <div class="flex items-center gap-4">
                <button v-if="currentView !== 'splash' || splashLevel > 0"
                    @click="currentView !== 'splash' ? goBack() : splashBack()"
                    class="bg-slate-700 hover:bg-slate-600 text-white rounded-lg p-3 active:scale-95 transition-transform flex items-center justify-center">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="text-3xl font-bold tracking-tight">{{ appTitle }}</h1>
            </div>
            <div class="flex items-center gap-6 text-slate-400 font-medium">
                <!-- Messages icon — manager only -->
                <button v-if="sessionRole === 'manager'" @click="openMessagesView"
                    class="relative flex items-center justify-center p-3 rounded-lg transition-colors"
                    :class="currentView === 'messages' ? 'bg-blue-700 text-white' : 'bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white'"
                    title="Messages">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <span v-if="dmUnreadCount > 0"
                        class="absolute -top-1 -right-1 bg-red-600 text-white text-xs font-bold min-w-[1.25rem] h-5 px-1 rounded-full flex items-center justify-center leading-none">
                        {{ dmUnreadCount }}
                    </span>
                </button>
                <!-- Undo button -->
                <button @click="undoLastAction"
                    :disabled="!lastUndoAction"
                    :title="lastUndoAction ? 'Undo: ' + lastUndoAction.description : 'Nothing to undo'"
                    class="flex items-center gap-2 px-4 py-3 rounded-lg font-bold text-sm transition-all active:scale-95"
                    :class="lastUndoAction ? 'bg-amber-700 hover:bg-amber-600 text-white' : 'bg-slate-800 text-slate-600 cursor-not-allowed'">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                    </svg>
                    <span>UNDO</span>
                    <span v-if="lastUndoAction" class="text-amber-300 text-xs max-w-[120px] truncate hidden lg:inline">{{ lastUndoAction.description }}</span>
                </button>
                <div v-if="loading" class="flex items-center gap-2 text-blue-400">
                    <svg class="animate-spin h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    Syncing...
                </div>
                <div class="text-2xl">{{ currentTime }}</div>
                <button v-if="sessionRole" @click="logout"
                    class="flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white text-sm font-semibold transition-colors active:scale-95">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    Sign Out
                </button>
            </div>
        </header>
        <!-- Offline banner -->
        <div v-if="isOffline"
            class="bg-red-700 text-white text-center font-bold py-2 px-4 text-sm shrink-0 z-20">
            &#9888; No connection to server &mdash; changes may not be saved. Retrying&hellip;
        </div>
        <!-- Version update banner -->
        <div v-if="versionUpdateAvailable"
            class="bg-amber-500 text-slate-900 text-center font-bold py-2 px-4 text-sm shrink-0 z-20 flex items-center justify-center gap-4">
            <span>&#8635; A new version is available &mdash; reloading shortly&hellip;</span>
            <button @click="location.reload()" class="underline font-extrabold hover:text-slate-700">Reload Now</button>
        </div>
