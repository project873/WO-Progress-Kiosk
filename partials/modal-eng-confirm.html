<!-- modal-eng-confirm.html — Delete confirmation for engineering inquiries -->
<div v-if="engDeleteConfirmOpen"
    class="fixed inset-0 bg-black/60 flex items-center justify-center z-50"
    @click.self="closeEngDeleteConfirm">
    <div class="bg-white rounded-2xl shadow-2xl w-96 p-6 flex flex-col gap-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </div>
            <h2 class="text-lg font-extrabold text-gray-800">Delete Inquiry?</h2>
        </div>
        <p class="text-sm text-gray-600 leading-relaxed">
            This will permanently delete the inquiry for
            <span class="font-semibold text-gray-800">{{ engDeleteTarget?.customer_name || 'this customer' }}</span><template v-if="engDeleteTarget?.sales_order_number">
            (SO# <span class="font-mono font-semibold text-gray-800">{{ engDeleteTarget.sales_order_number }}</span>)</template>.
            This cannot be undone.
        </p>
        <div class="flex gap-3 justify-end pt-1">
            <button @click="closeEngDeleteConfirm"
                class="px-4 py-2 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold text-sm active:scale-95 transition-all">
                Cancel
            </button>
            <button @click="confirmEngDelete"
                class="px-4 py-2 rounded-xl bg-red-600 hover:bg-red-500 text-white font-bold text-sm active:scale-95 transition-all">
                Delete
            </button>
        </div>
    </div>
</div>
